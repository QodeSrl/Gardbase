<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f9fc" media="(prefers-color-scheme: light)" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("gardbase-theme") || "dark";
          document.documentElement.classList.add(t === "light" ? "light" : "dark");
          document.documentElement.style.colorScheme = t === "light" ? "light" : "dark";
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta
      name="description"
      content="Gardbase — the open-source, zero-trust encrypted NoSQL database. Client-side encryption with AWS Nitro Enclave attestation, so the backend never sees plaintext. Apache 2.0."
    />
    <title>Gardbase — Open-source zero-trust encrypted database</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
